on:
  push:
    branches:
      - master

env:
  SWR_ADDR: swr.cn-east-3.myhuaweicloud.com
  SWR_ORG: career-ai

jobs:
  build-frontend:
    name: 构建前端镜像
    steps:
      - name: 安装依赖并构建
        run: |
          cd career-frontend
          npm ci
          VITE_API_BASE=/api npm run build

      - name: 推送前端镜像到SWR
        run: |
          docker login -u ${SWR_USERNAME} -p ${SWR_PASSWORD} ${SWR_ADDR}
          docker build -t ${SWR_ADDR}/${SWR_ORG}/frontend:${PIPELINE_BUILD_NUMBER} \
                       -t ${SWR_ADDR}/${SWR_ORG}/frontend:latest \
                       ./career-frontend
          docker push ${SWR_ADDR}/${SWR_ORG}/frontend:${PIPELINE_BUILD_NUMBER}
          docker push ${SWR_ADDR}/${SWR_ORG}/frontend:latest

  build-backend:
    name: 构建后端镜像
    steps:
      - name: 推送后端镜像到SWR
        run: |
          docker login -u ${SWR_USERNAME} -p ${SWR_PASSWORD} ${SWR_ADDR}
          docker build -t ${SWR_ADDR}/${SWR_ORG}/backend:${PIPELINE_BUILD_NUMBER} \
                       -t ${SWR_ADDR}/${SWR_ORG}/backend:latest \
                       ./career-agent
          docker push ${SWR_ADDR}/${SWR_ORG}/backend:${PIPELINE_BUILD_NUMBER}
          docker push ${SWR_ADDR}/${SWR_ORG}/backend:latest

  deploy:
    name: 部署到服务器
    needs: [build-frontend, build-backend]
    steps:
      - name: SSH部署
        run: |
          echo "${SSH_PRIVATE_KEY}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          scp -i /tmp/deploy_key -o StrictHostKeyChecking=no \
            docker-compose.yml \
            ${SERVER_USER}@${SERVER_HOST}:/root/career-ai/

          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no \
            ${SERVER_USER}@${SERVER_HOST} bash << EOF
          set -e
          cd /root/career-ai

          mkdir -p career-agent career-db-service
          cat > career-agent/.env << 'ENVEOF'
          ${BACKEND_ENV}
          ENVEOF
          cat > career-db-service/.env << 'DBEOF'
          ${DB_SERVICE_ENV}
          DBEOF

          export TAG=${PIPELINE_BUILD_NUMBER}
          export SWR_ORG=career-ai

          docker login -u ${SWR_USERNAME} -p ${SWR_PASSWORD} swr.cn-east-3.myhuaweicloud.com
          docker compose pull frontend backend
          docker compose up -d frontend backend

          for i in \$(seq 1 30); do
            if curl -fsS http://localhost:8000/health >/dev/null; then
              echo "backend healthy"
              exit 0
            fi
            sleep 2
          done
          echo "backend failed health check"
          docker compose logs --tail=50 backend
          exit 1
          EOF
