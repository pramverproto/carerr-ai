name: Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'career-agent/**'
      - 'career-frontend/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  # ── 1. 前端：npm build → 镜像 push 到 GHCR ──────────────────────────
  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: career-frontend/package-lock.json

      - name: Build frontend dist
        working-directory: career-frontend
        run: |
          npm ci
          npm run build

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repo
        id: repo
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - uses: docker/build-push-action@v6
        with:
          context: ./career-frontend
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ steps.repo.outputs.name }}/frontend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ steps.repo.outputs.name }}/frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # ── 2. 后端：直接 docker build → push ─────────────────────────────
  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repo
        id: repo
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - uses: docker/build-push-action@v6
        with:
          context: ./career-agent
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ steps.repo.outputs.name }}/backend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ steps.repo.outputs.name }}/backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  # ── 3. 部署：服务器 pull 镜像 + 重启 + 健康检查 ────────────────────
  deploy:
    needs: [build-frontend, build-backend]
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - uses: actions/checkout@v4

      # 同步 docker-compose.yml 到服务器（compose 内 image: 字段可能改了）
      - uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: docker-compose.yml
          target: /root/career-ai/

      - name: Pull & restart on server
        uses: appleboy/ssh-action@v1
        timeout-minutes: 40
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          script: |
            set -e
            cd /root/career-ai

            # 写入 .env 文件（内容来自 GitHub Secrets，不进 git）
            mkdir -p career-agent career-db-service
            cat > career-agent/.env << 'ENVEOF'
            ${{ secrets.BACKEND_ENV }}
            ENVEOF
            cat > career-db-service/.env << 'DBENVEOF'
            ${{ secrets.DB_SERVICE_ENV }}
            DBENVEOF

            REPO=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')
            export TAG='${{ github.sha }}'
            export GHCR_REPO="$REPO"

            # 登录 GHCR（用 GITHUB_TOKEN 即可拉私有镜像）
            echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin

            docker compose pull backend frontend
            docker compose up -d backend frontend

            # 健康检查（最多 30 秒）
            for i in $(seq 1 15); do
              if curl -fsS http://localhost:8000/health >/dev/null; then
                echo "✅ backend healthy"
                # 清除旧的职业匹配缓存（避免旧空结果残留）
                docker compose exec -T backend python -c "
import asyncio, redis.asyncio as r
async def flush():
    c = r.from_url('redis://host.docker.internal:6379/0')
    keys = await c.keys('career:match:*')
    if keys:
        await c.delete(*keys)
        print(f'cleared {len(keys)} match cache keys')
    await c.aclose()
asyncio.run(flush())
" 2>/dev/null || true
                exit 0
              fi
              sleep 2
            done
            echo "❌ backend failed health check"
            docker compose logs --tail=50 backend
            exit 1
