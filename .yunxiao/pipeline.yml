name: career-ai-pipeline

sources:
  main_repo:
    type: codeup
    name: career-ai
    branch: master
    triggerEvents: push

stages:
  build_frontend:
    name: "构建前端镜像"
    jobs:
      build_frontend_job:
        name: "npm构建并推送镜像"
        runsOn:
          group: public/cn-beijing
          container: build-steps-public-registry.cn-beijing.cr.aliyuncs.com/build-steps/nodejs20:latest
        steps:
          npm_build:
            step: ShellBuild
            name: "npm构建"
            with:
              run: |
                cd career-frontend
                npm ci
                VITE_API_BASE=/api npm run build

          docker_push_frontend:
            step: ShellBuild
            name: "构建并推送前端镜像"
            with:
              run: |
                docker login -u ${DOCKERHUB_USERNAME} -p ${DOCKERHUB_PASSWORD}
                docker build -t ${DOCKERHUB_USERNAME}/career-ai-frontend:${PIPELINE_ID} \
                             -t ${DOCKERHUB_USERNAME}/career-ai-frontend:latest \
                             ./career-frontend
                docker push ${DOCKERHUB_USERNAME}/career-ai-frontend:${PIPELINE_ID}
                docker push ${DOCKERHUB_USERNAME}/career-ai-frontend:latest

  build_backend:
    name: "构建后端镜像"
    jobs:
      build_backend_job:
        name: "构建并推送后端镜像"
        runsOn:
          group: public/cn-beijing
          container: build-steps-public-registry.cn-beijing.cr.aliyuncs.com/build-steps/alinux3:latest
        steps:
          docker_push_backend:
            step: ShellBuild
            name: "构建并推送后端镜像"
            with:
              run: |
                docker login -u ${DOCKERHUB_USERNAME} -p ${DOCKERHUB_PASSWORD}
                docker build -t ${DOCKERHUB_USERNAME}/career-ai-backend:${PIPELINE_ID} \
                             -t ${DOCKERHUB_USERNAME}/career-ai-backend:latest \
                             ./career-agent
                docker push ${DOCKERHUB_USERNAME}/career-ai-backend:${PIPELINE_ID}
                docker push ${DOCKERHUB_USERNAME}/career-ai-backend:latest

  deploy:
    name: "部署到服务器"
    jobs:
      deploy_job:
        name: "SSH部署"
        runsOn:
          group: public/cn-beijing
          container: build-steps-public-registry.cn-beijing.cr.aliyuncs.com/build-steps/alinux3:latest
        steps:
          ssh_deploy:
            step: ShellBuild
            name: "SSH部署到服务器"
            with:
              run: |
                echo "${SSH_PRIVATE_KEY}" > /tmp/deploy_key
                chmod 600 /tmp/deploy_key

                scp -i /tmp/deploy_key -o StrictHostKeyChecking=no \
                  docker-compose.yml ${SERVER_USER}@${SERVER_HOST}:/root/career-ai/

                ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no \
                  ${SERVER_USER}@${SERVER_HOST} bash << EOF
                set -e
                cd /root/career-ai

                mkdir -p career-agent career-db-service
                cat > career-agent/.env << 'ENVEOF'
                ${BACKEND_ENV}
                ENVEOF
                cat > career-db-service/.env << 'DBEOF'
                ${DB_SERVICE_ENV}
                DBEOF

                export TAG=${PIPELINE_ID}
                docker login -u ${DOCKERHUB_USERNAME} -p ${DOCKERHUB_PASSWORD}
                docker compose pull frontend backend
                docker compose up -d frontend backend

                for i in \$(seq 1 30); do
                  if curl -fsS http://localhost:8000/health >/dev/null; then
                    echo "backend healthy"
                    exit 0
                  fi
                  sleep 2
                done
                echo "backend failed health check"
                docker compose logs --tail=50 backend
                exit 1
                EOF
